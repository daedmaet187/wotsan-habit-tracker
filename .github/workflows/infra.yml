name: Infrastructure CI/CD
on:
  push:
    branches: [main]
    paths: [infra/**]
  workflow_dispatch:

# GitHub Secrets required:
#   AWS_ACCESS_KEY_ID        - IAM user access key (TODO: replace with OIDC)
#   AWS_SECRET_ACCESS_KEY    - IAM user secret key (TODO: replace with OIDC)
#   CF_DNS_TOKEN             - Cloudflare API token (DNS edit permission)
#   CF_ZONE_ID               - Cloudflare zone ID for target domain
#
# Secrets NO LONGER needed (removed — auto-generated by Terraform):
#   DB_PASSWORD              - now generated by random_password resource
#   JWT_SECRET               - now generated by random_bytes resource


env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  opentofu:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: opentofu/setup-opentofu@v1

      - name: OpenTofu Init
        run: tofu -chdir=infra init
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: eu-central-1

      - name: OpenTofu Plan
        run: |
          tofu -chdir=infra plan -out=tfplan \
            -var="cf_dns_token=$CF_DNS_TOKEN" \
            -var="cloudflare_zone_id=$CF_ZONE_ID"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: eu-central-1
          CF_DNS_TOKEN: ${{ secrets.CF_DNS_TOKEN }}
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}

      - name: OpenTofu Apply
        run: tofu -chdir=infra apply -auto-approve tfplan
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: eu-central-1
