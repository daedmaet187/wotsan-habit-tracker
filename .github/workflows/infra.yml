name: Infrastructure CI/CD
on:
  push:
    branches: [main]
    paths: [infra/**]

jobs:
  opentofu:
    runs-on: ubuntu-latest
    environment: production # Use GitHub Environments for secret control
    steps:
      - uses: actions/checkout@v4
      - uses: opentofu/setup-opentofu@v1

      - name: OpenTofu Init
        run: tofu -chdir=infra init
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: OpenTofu Plan
        run: tofu -chdir=infra plan -out=tfplan

      - name: OpenTofu Apply
        run: tofu -chdir=infra apply -auto-approve tfplan
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          CF_DNS_TOKEN: ${{ secrets.CF_DNS_TOKEN }}
          JWT_SECRET: 'GENERATED_SECRET_ON_DEPLOY' # Will use a better mechanism later
