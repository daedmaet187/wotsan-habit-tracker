name: Backend CI/CD
on:
  push:
    branches: [main]
    paths: [backend/**, infra/**]
  workflow_dispatch:


env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-central-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build, tag, and push the image to ECR
        env:
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY_URL }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE=${ECR_REGISTRY}/wotsan-habit-tracker-api:${IMAGE_TAG}
          docker build -t $IMAGE ./backend
          docker push $IMAGE
          echo "IMAGE_URI=$IMAGE" >> $GITHUB_ENV

      - name: Register new ECS task definition and deploy
        env:
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY_URL }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE=${ECR_REGISTRY}/wotsan-habit-tracker-api:${IMAGE_TAG}

          # Fetch current task def, swap image, register new revision
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition wotsan-habit-tracker-api \
            --query 'taskDefinition' --output json)

          NEW_TASK_DEF=$(echo $TASK_DEF | python3 -c "
          import json, sys
          d = json.load(sys.stdin)
          d['containerDefinitions'][0]['image'] = '${IMAGE}'
          for k in ['taskDefinitionArn','revision','status','requiresAttributes',
                    'placementConstraints','compatibilities','registeredAt','registeredBy']:
              d.pop(k, None)
          print(json.dumps(d))
          ")

          NEW_REVISION=$(aws ecs register-task-definition \
            --cli-input-json "$NEW_TASK_DEF" \
            --query 'taskDefinition.taskDefinitionArn' --output text)

          echo "Deploying task def: $NEW_REVISION"

          aws ecs update-service \
            --cluster wotsan-habit-tracker-cluster \
            --service wotsan-habit-tracker-api \
            --task-definition "$NEW_REVISION" \
            --force-new-deployment

          # Wait for service to stabilize
          aws ecs wait services-stable \
            --cluster wotsan-habit-tracker-cluster \
            --services wotsan-habit-tracker-api

          echo "Deployment complete"
